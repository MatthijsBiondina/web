apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend
        image: frontend:dev
        ports:
        - containerPort: 3000
        env:
        - name: REACT_APP_API_URL
          value: "http://backend:5000"
        - name: NODE_ENV
          value: "development"
        - name: NODE_OPTIONS
          value: "--max-old-space-size=2048"
        - name: CI
          value: "true"
        - name: ESLINT_NO_DEV_ERRORS
          value: "true"
        - name: CHOKIDAR_USEPOLLING
          value: "true"
        - name: FAST_REFRESH
          value: "true"
        - name: WDS_SOCKET_PORT
          value: "3000"
        - name: WDS_SOCKET_HOST
          value: "0.0.0.0"
        resources:
          limits:
            cpu: "1000m"
            memory: "2048Mi"
          requests:
            cpu: "200m"
            memory: "1024Mi"
